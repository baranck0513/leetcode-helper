<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode Helper — Hint History</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>LeetCode Helper</h1>
      <p class="tagline">Hint History</p>
    </header>

    <div class="toolbar">
      <span id="problem-count" class="count-label"></span>
      <button id="clear-all-btn" class="clear-all-btn">Clear All</button>
    </div>

    <div id="history-list"></div>

    <div id="empty-state" class="empty-state hidden">
      <p>No hint history yet. Start solving problems!</p>
    </div>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
